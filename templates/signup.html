<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AEO Agents</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesv2.1.css') }}">
</head>
<body class="auth-body">

<div class="auth-shell-clean">

    <section class="auth-left">
        <div class="auth-left-inner">
            <div class="brand-mark large">A</div>

            <h1>AEO Agents</h1>

            <p>
                Track AI visibility. Fix what matters. Grow your presence in AI answers.
            </p>

            <div class="auth-trust">
                <span>Secure login</span>
                <span>No spam</span>
                <span>Your data stays private</span>
            </div>
        </div>
    </section>

    <section class="auth-right">
        <div class="auth-card">

            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Log in to continue</p>
            </div>

            {% if error %}
            <div class="auth-alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="form-stack" onsubmit="handleLoginSubmit()">

                <div class="form-field">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                        autofocus
                    >
                </div>

                <div class="form-field">
                    <label for="password">Password</label>

                    <div class="password-field">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button
                            type="button"
                            class="password-toggle"
                            aria-label="Show password"
                            onclick="togglePasswordVisibility('password', this)"
                        >
                            Show
                        </button>
                    </div>
                </div>

                <div class="form-extra">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    Log In
                </button>
            </form>

            <div class="auth-divider"></div>

            <div class="auth-links">
                <span>New here?</span>
                <a href="{{ url_for('signup') }}">Create account</a>
            </div>

            <div class="auth-links small">
                <a href="{{ url_for('aeo_agency_page') }}">Back to landing</a>
            </div>

        </div>
    </section>

</div>

<style>
.auth-shell-clean {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr;
    background:
        radial-gradient(circle at top left, rgba(255, 106, 43, 0.10), transparent 24%),
        linear-gradient(180deg, #f6f8fc 0%, #eef3f9 100%);
}

.auth-left,
.auth-right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.auth-left-inner {
    max-width: 420px;
    display: grid;
    gap: 16px;
    text-align: center;
}

.auth-left h1 {
    margin: 0;
    font-size: 30px;
    font-weight: 800;
    line-height: 1.08;
    color: #15233b;
}

.auth-left p {
    margin: 0;
    color: #6b7280;
    line-height: 1.6;
    font-size: 15px;
}

.auth-trust {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
}

.auth-trust span {
    display: inline-flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 999px;
    background: #f8fafc;
    border: 1px solid #e7ebf3;
    color: #6b7280;
    font-size: 12px;
    font-weight: 700;
}

.auth-card {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    background: rgba(255, 255, 255, 0.96);
    border-radius: 18px;
    border: 1px solid #e7ebf3;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
}

.auth-header h2 {
    margin: 0;
    font-size: 28px;
    line-height: 1.1;
    color: #15233b;
}

.auth-header p {
    margin: 6px 0 16px;
    color: #6b7280;
    font-size: 14px;
    line-height: 1.6;
}

.auth-alert {
    background: #fff4f4;
    border: 1px solid #fecaca;
    padding: 12px 14px;
    margin-bottom: 14px;
    border-radius: 12px;
    color: #b91c1c;
    font-size: 14px;
    line-height: 1.5;
}

.password-field {
    position: relative;
    display: flex;
    align-items: center;
}

.password-field input {
    width: 100%;
    padding-right: 72px;
}

.password-toggle {
    position: absolute;
    right: 10px;
    background: transparent;
    border: none;
    color: #6b7280;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
}

.password-toggle:hover {
    color: #15233b;
}

.form-extra {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
}

.forgot-link {
    font-size: 12px;
    color: #6b7280;
    text-decoration: none;
}

.forgot-link:hover {
    color: #15233b;
}

.auth-divider {
    height: 1px;
    background: #e7ebf3;
    margin: 16px 0;
}

.auth-links {
    text-align: center;
    font-size: 14px;
    color: #6b7280;
}

.auth-links a {
    font-weight: 700;
}

.auth-links.small {
    margin-top: 8px;
    font-size: 12px;
}

@media (min-width: 768px) {
    .auth-shell-clean {
        grid-template-columns: 1fr 1fr;
    }

    .auth-left-inner {
        text-align: left;
    }

    .auth-left {
        align-items: center;
    }
}

@media (max-width: 767px) {
    .auth-left {
        padding-bottom: 8px;
    }

    .auth-right {
        padding-top: 8px;
    }

    .auth-left-inner {
        gap: 12px;
    }

    .auth-card {
        padding: 22px;
    }

    .auth-left h1 {
        font-size: 26px;
    }

    .auth-header h2 {
        font-size: 24px;
    }
}
</style>

<script>
function handleLoginSubmit() {
    const btn = document.getElementById('loginBtn');
    if (btn) {
        btn.disabled = true;
        btn.innerText = 'Logging in...';
    }
}

function togglePasswordVisibility(inputId, buttonEl) {
    const input = document.getElementById(inputId);
    if (!input) return;

    if (input.type === 'password') {
        input.type = 'text';
        buttonEl.textContent = 'Hide';
        buttonEl.setAttribute('aria-label', 'Hide password');
    } else {
        input.type = 'password';
        buttonEl.textContent = 'Show';
        buttonEl.setAttribute('aria-label', 'Show password');
    }
}
</script>

</body>
</html>
